name: Build Ubuntu 24.04 DEBs

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build DEB
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libhidapi-dev \
            debhelper \
            devscripts \
            libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build HeadsetControl (Core)
        run: |
          mkdir build
          cd build
          cmake ..
          make -j$(nproc)
          sudo make install

      - name: Build Tray Widget DEB
        run: |
          cd headsetcontrol-tray
          # Build the project to ensure everything is correct
          cargo build --release
          # Package using dpkg-buildpackage
          # -d skips build dependency checks as we use a custom Rust toolchain
          dpkg-buildpackage -us -uc -b -d

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: headsetcontrol-tray-deb
          path: headsetcontrol-tray_*.deb
          retention-days: 30
          compression-level: 0
