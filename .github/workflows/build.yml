name: Build Ubuntu 24.04 DEBs

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build DEB
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libhidapi-dev \
            debhelper \
            devscripts \
            libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build HeadsetControl (Core) DEB
        run: |
          dpkg-buildpackage -us -uc -b
          mv ../headsetcontrol_*.deb .

      - name: Build Tray Widget DEB
        run: |
          cd headsetcontrol-tray
          # Build the project to ensure everything is correct
          cargo build --release
          # Package using dpkg-buildpackage
          # -d skips build dependency checks as we use a custom Rust toolchain
          dpkg-buildpackage -us -uc -b -d
          # The DEB is now in the parent directory (repo root)

      - name: Upload HeadsetControl DEB
        uses: actions/upload-artifact@v7
        with:
          name: headsetcontrol-deb
          path: headsetcontrol_*.deb
          retention-days: 30

      - name: Upload Tray Widget DEB
        uses: actions/upload-artifact@v7
        with:
          name: headsetcontrol-tray-deb
          path: headsetcontrol-tray_*.deb
          retention-days: 30
